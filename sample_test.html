<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARS Airlines - Đăng ký (Test AutoFill)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-control:focus, .form-select:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13,110,253,.15); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top mb-4 bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">ARS Airlines</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Tìm chuyến bay</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Đăng ký</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-5 mt-4">
                    <h3 class="fw-bold mb-4 text-center">ĐĂNG KÝ THÀNH VIÊN</h3>
                    <p class="text-muted text-center mb-4">Mẫu HTML này được sử dụng để kiểm tra chức năng AutoFill.</p>
                    
                    <form action="#" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Tên đăng nhập *</label>
                                <input type="text" name="userId" id="userId" class="form-control" required="">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Email *</label>
                                <input type="email" name="email" id="email" class="form-control" required="">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Mật khẩu *</label>
                                <input type="password" name="password" id="password" class="form-control" required="">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Họ</label>
                                <input type="text" name="lastName" id="lastName" class="form-control" required="">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Tên</label>
                                <input type="text" name="firstName" id="firstName" class="form-control" required="">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Số điện thoại</label>
                                <input type="text" name="phone" id="phone" class="form-control" required="">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Giới tính</label>
                                <select name="gender" id="gender" class="form-select">
                                    <option value="Male">Nam</option>
                                    <option value="Female">Nữ</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Tuổi</label>
                                <input type="number" name="age" id="age" class="form-control" required="">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Thẻ tín dụng</label>
                                <input type="text" name="creditCard" id="creditCard" class="form-control" required="">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small text-muted">Địa chỉ</label>
                                <textarea name="address" id="address" class="form-control" rows="2" required=""></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm mt-4">ĐĂNG KÝ NGAY</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-4 border-top bg-white">
        <div class="container text-center text-muted small">
            © 2026 Airlines Reservation System. All rights reserved.
        </div>
    </footer>
</body>
</html>
